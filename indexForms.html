<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styleForms.css">
    <title>Document</title>
  </head>
  <body>
    <!-- Write your code here -->
    <form action="https://mate-academy-form-lesson.herokuapp.com/create-application" method="POST">
      <fieldset class="fieldset">
        <legend class="legend">Personal information</legend>
        <div>
          <label class="row">
            Surname:
            <input type="text" name="surname" id="surname">
          </label>
        </div>
        <div>
          <label class="row">
            Name:
            <input type="text" name="name" id="name">
          </label>
        </div>
        <div>
          <label class="row">
            How old are You? 
            <input type="number" name="age" id="age" min="1" max="100" value="18">
          </label>
        </div>
        <div>
          <label class="row">
            Full date of birth:
            <input type="date" name="birthday">
          </label>
        </div>
        <div>
          <label class="row">
            I accept the term of the agreement
            <input type="checkbox" name="accepted" id="accepted" value="yes" required>
          </label>
        </div>
      </fieldset>
      <fieldset class="fieldset">
        <legend class="legend">Registration</legend>
        <div>
          <label class="row">
            E-mail:
            <input type="email" name="email" id="email" placeholder="email@example.com" required>
          </label>
        </div>
        <div>
          <label class="row">
            Password:
            <input type="password" name="password" id="password" minlength="6" maxlength="30" placeholder="Password" required>
          </label>
        </div>
      </fieldset>
      <fieldset class="fieldset">
        <legend class="legend">An interesting fact about you!</legend>
        <div class="row">
          Do you love cats?
          <label>
            <input type="radio" name="cats" id="cats" value="yes"> Yes
          </label>
          <label>
            <input type="radio" name="cats" id="cats" value="no"> No
          </label>
        </div>
        <div>
          <label class="row">
            What is your favorite color?
            <input type="color" name="color" id="color">
          </label>
        </div>
        <div>
          <label class="row">
            What time do you go to bed?
            <input type="time" name="time" step="1">
          </label>
        </div>
        <div>
          <label class="row">
            What are your favorite brand of cars?
            <select name="cars" id="cars" multiple>
              <option value="bmw">BMW</option> 
              <option value="audi">Audi</option> 
              <option value="skoda">Skoda</option> 
            </select>
          </label>
        </div>
        <div>
          <label class="row">
            How do you rate our work?
            <input type="range" name="rate" id="rate" min="0" max="5" step="1" value="0">
          </label>
        </div>
      </fieldset>
      <fieldset class="fieldset">
        <legend class="legend">Additional info:</legend>
        <div>
          <label class="row">
            Comments:
            <textarea name="comments" id="comments"></textarea>
          </label>
        </div>
        <div>
          <label class="row">
            Would you recommend us?
            <select name="recommend" id="recommend">
              <option value="yes">yes</option>
              <option value="no">no</option>
            </select>
          </label>
        </div>
      </fieldset>
      <button type="submit">Submit</button>
    </form>

  </body>
</html>
